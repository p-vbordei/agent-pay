services:
  bitcoind:
    image: polarlightning/bitcoind:27.0
    command:
      - bitcoind
      - -server=1
      - -regtest=1
      - -rpcuser=polar
      - -rpcpassword=polar
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -txindex=1
      - -fallbackfee=0.0002
      - -zmqpubrawblock=tcp://0.0.0.0:28334
      - -zmqpubrawtx=tcp://0.0.0.0:28335
    ports:
      - '18443:18443'
      - '18444:18444'

  alice:
    image: polarlightning/lnd:0.18.0-beta
    depends_on: [bitcoind]
    command:
      - lnd
      - --noseedbackup
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=polar
      - --bitcoind.rpcpass=polar
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28334
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28335
      - --restlisten=0.0.0.0:8080
      - --rpclisten=0.0.0.0:10009
      - --listen=0.0.0.0:9735
      - --externalip=alice
      - --tlsextradomain=alice
      - --tlsextradomain=localhost
      - --alias=alice
    ports:
      - '8081:8080'
      - '10009:10009'
      - '9735:9735'

  bob:
    image: polarlightning/lnd:0.18.0-beta
    depends_on: [bitcoind, alice]
    command:
      - lnd
      - --noseedbackup
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=polar
      - --bitcoind.rpcpass=polar
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28334
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28335
      - --restlisten=0.0.0.0:8080
      - --rpclisten=0.0.0.0:10009
      - --listen=0.0.0.0:9735
      - --externalip=bob
      - --tlsextradomain=bob
      - --tlsextradomain=localhost
      - --alias=bob
    ports:
      - '8082:8080'
      - '10010:10009'
      - '9736:9735'
